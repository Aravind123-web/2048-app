# deployment for 2048 app
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: 2048-app
  name: deployment-2048
spec:
  selector:
    matchLabels:
      project: app-2048
      env: dev
  replicas: 5
  #pod definition
  template:
    metadata:
    # These labesl are pod related labels
      labels:
        project: app-2048
        env: dev
    spec:
      containers:
      - image: public.ecr.aws/l6m2t8p7/docker-2048:latest
        imagePullPolicy: Always
        name: app-2048
        ports:
        - containerPort: 80
---
# service for 2048 app
apiVersion: v1
kind: Service
metadata:
  namespace: 2048-app
  name: service-2048
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: NodePort
  selector:
    project: app-2048
    env: dev
---
# ingress for 2048 app
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: 2048-app
  name: ingress-2048
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: service-2048
              port:
                number: 80